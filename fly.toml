# fly.toml app configuration file generated for homeji-api on 2026-07-07T11:39:50Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'homeji-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
